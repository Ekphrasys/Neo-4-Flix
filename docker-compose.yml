services:
  neo4j:
    image: neo4j:latest
    container_name: neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      - NEO4J_AUTH=neo4j/password
    volumes:
      - neo4j_data:/data

  frontend:
    build: ./frontend
    ports:
      - "4200:4200"
    environment:
      - MOVIE_SERVICE_URL=http://movie-service:8082
      # Allow incoming requests on http://localhost:4200 when SSR is enabled (Angular SSR SSRF protection)
      - NG_ALLOWED_HOSTS=localhost,127.0.0.1,0.0.0.0
    depends_on:
      - movie-service

  movie-service:
    build: ./services/movie-service
    ports:
      - "8082:8082"
    environment:
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASSWORD=password
    depends_on:
      - neo4j

volumes:
  neo4j_data:

